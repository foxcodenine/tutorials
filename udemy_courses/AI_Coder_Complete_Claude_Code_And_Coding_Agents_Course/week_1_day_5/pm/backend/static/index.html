<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Studio — Hello World</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #032147;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    .card {
      background: white;
      border: 1px solid rgba(3,33,71,0.08);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      box-shadow: 0 18px 40px rgba(3,33,71,0.12);
      text-align: center;
    }
    .label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #888;
      margin-bottom: 0.5rem;
    }
    .result {
      font-size: 1.1rem;
      font-weight: 600;
      color: #209dd7;
      margin-top: 0.5rem;
    }
    .accent { display: inline-block; width: 40px; height: 4px; background: #ecad0a; border-radius: 4px; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <h1>Hello World</h1>
    <p class="label">API health check</p>
    <p class="result" id="result">Loading...</p>
  </div>
  <script>
    fetch("/api/health")
      .then((r) => r.json())
      .then((data) => {
        document.getElementById("result").textContent = JSON.stringify(data);
      })
      .catch((err) => {
        document.getElementById("result").textContent = "Error: " + err.message;
        document.getElementById("result").style.color = "#c0392b";
      });
  </script>
</body>
</html>
